name: Update Live Bus Map

on:
  schedule:

    - cron: '*/5 * * * *'
  workflow_dispatch: 

jobs:
  build-map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script to generate map

        env:
          API_URL: ${{ secrets.API_URL }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          DEVICE_ID: ${{ secrets.DEVICE_ID }}
        run: python mapa_buseva.py

      - name: Commit and push if map changed
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 'Automatsko ažuriranje mape autobusa'
          file_pattern: 'kragujevac_busevi.html'